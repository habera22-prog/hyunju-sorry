<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현주야 미안해</title>

  <meta property="og:title" content="현주야 미안해" />
  <meta property="og:description" content="한 번만 눌러줘. 내 마음을 담았어." />
  <meta property="og:type" content="website" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.9), transparent 35%),
        linear-gradient(180deg, #fff8fb 0%, #ffe8f0 55%, #ffdbe8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: #5b2b3a;
    }

    .card {
      width: min(90vw, 420px);
      padding: 28px 22px 34px;
      border-radius: 28px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(138, 53, 86, 0.16);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 8px;
      animation: bob 2.4s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.3;
      color: #c43d72;
    }

    .sub {
      margin: 10px 0 24px;
      font-size: 15px;
      line-height: 1.6;
      color: #7a5562;
      word-break: keep-all;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 16px 24px;
      width: 100%;
      font-size: 17px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff5c93, #ff7aa8);
      box-shadow: 0 14px 28px rgba(255, 92, 147, 0.28);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 8px 18px rgba(255, 92, 147, 0.22);
    }

    .message-wrap {
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
    }

    .message {
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      transition: all 0.7s ease;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .main-text {
      font-size: 32px;
      font-weight: 800;
      color: #d6336c;
      line-height: 1.35;
      margin-bottom: 8px;
      word-break: keep-all;
    }

    .small-text {
      font-size: 15px;
      color: #7d5663;
      line-height: 1.6;
    }

    .heart {
      position: absolute;
      bottom: -30px;
      pointer-events: none;
      animation-name: floatUp;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      opacity: 0;
      z-index: 1;
      filter: drop-shadow(0 8px 10px rgba(255, 92, 147, 0.18));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.7) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-115vh) translateX(var(--drift, 0px)) scale(1.3) rotate(18deg);
        opacity: 0;
      }
    }

    .glow {
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255, 140, 180, 0.18), transparent 65%);
      border-radius: 999px;
      z-index: 0;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.12); opacity: 0.55; }
    }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: #a17784;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="emoji">💗</div>
    <h1>한 번만 눌러줘</h1>
    <p class="sub">버튼을 누르면 내 마음이 하트처럼 쏟아질 거야.</p>

    <button class="btn" id="startBtn">눌러보기</button>

    <div class="message-wrap">
      <div class="message" id="messageBox">
        <div class="main-text">현주야 미안해</div>
        <div class="small-text">진심으로 사과하고 싶었어.<br>내 마음이 전해졌으면 좋겠어.</div>
      </div>
    </div>

    <div class="footer-note">from. 미안한 마음을 담아서</div>
  </div>

  <script>
    const btn = document.getElementById('startBtn');
    const messageBox = document.getElementById('messageBox');

    btn.addEventListener('click', () => {
      messageBox.classList.add('show');
      burstHearts(36);
      btn.textContent = '다시 한 번 더 💞';
    });

    function burstHearts(count) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => createHeart(), i * 70);
      }
    }

    function createHeart() {
      const heart = document.createElement('div');
      const hearts = ['💖', '💗', '💘', '💕', '💞'];
      heart.className = 'heart';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];

      const left = Math.random() * window.innerWidth;
      const size = 20 + Math.random() * 24;
      const duration = 2.6 + Math.random() * 2.2;
      const drift = -60 + Math.random() * 120;

      heart.style.left = `${left}px`;
      heart.style.fontSize = `${size}px`;
      heart.style.animationDuration = `${duration}s`;
      heart.style.setProperty('--drift', `${drift}px`);

      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), duration * 1000 + 200);
    }
  </script>
</body>
</html>
